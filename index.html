<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HIFU Dash | Episonica</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="arcade">
      <section class="marquee">
        <div>
          <p class="eyebrow">Episonica Presents</p>
          <h1>HIFU<br />DASH</h1>
          <p>超音波焦點穿越人體組織，避開血管、神經、器官，精準擊中腫瘤。</p>
        </div>
        <button id="startButton" class="play-button">PLAY</button>
      </section>

      <section class="cabinet">
        <aside class="level-panel">
          <div class="panel-title">LEVEL SELECT</div>
          <button class="level-card active" data-level="uterine">
            <span class="tumor-icon"></span>
            <strong>Uterine Fibroid</strong>
            <small>衛教展示</small>
            <em>★★★</em>
          </button>
          <button class="level-card" data-level="liver">
            <span class="tumor-icon red"></span>
            <strong>Liver Tumor</strong>
            <small>醫學會模式</small>
            <em>★★☆</em>
          </button>
          <button class="level-card" data-level="bone">
            <span class="tumor-icon gold"></span>
            <strong>Bone Metastasis</strong>
            <small>COMING SOON</small>
            <em>★☆☆</em>
          </button>

          <div class="stats">
            <div><span>能量</span><strong id="energy">100%</strong></div>
            <div><span>安全率</span><strong id="safety">100%</strong></div>
            <div><span>命中</span><strong id="hits">0</strong></div>
            <div><span>距離</span><strong id="distance">0 m</strong></div>
          </div>
        </aside>

        <section class="game-card">
          <div class="hud">
            <div class="progress-track"><span id="progressBar"></span></div>
            <strong id="attempt">ATTEMPT 1</strong>
            <span id="progressText">0%</span>
            <span class="coin">● <b id="coins">0</b></span>
            <button id="pauseButton" class="icon-button" aria-label="Pause">Ⅱ</button>
          </div>
          <canvas id="game" width="1280" height="720" aria-label="HIFU Dash game canvas"></canvas>
          <div id="overlay" class="overlay menu">
            <h2>HIFU DASH</h2>
            <p>像 Geometry Dash，一眼懂 HIFU：能量只該打到腫瘤。</p>
            <button class="play-button small">PLAY</button>
            <small>Space / Click / Tap 跳躍，P 暫停</small>
          </div>
        </section>
      </section>

      <section class="use-cases">
        <span>醫學會展示</span>
        <span>醫院衛教</span>
        <span>投資人簡報</span>
        <span>展場互動</span>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
